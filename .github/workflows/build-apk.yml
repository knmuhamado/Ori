name: Build Android APK

# Se ejecuta automáticamente en cada push a main
# También se puede lanzar manualmente desde la pestaña "Actions" de GitHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag de versión (ej: v1.0.0). Si se provee, crea un GitHub Release.'
        required: false
        default: ''

jobs:
  build:
    name: Build APK Debug
    runs-on: ubuntu-latest

    steps:
      # 1. Bajar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Java 17 (requerido por Gradle en este proyecto)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configurar Flutter estable
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Instalar dependencias
      - name: Flutter pub get
        run: flutter pub get

      # 5. Compilar APK debug
      #    Debug APK no necesita keystore — sirve para QA interno
      - name: Build APK debug
        run: flutter build apk --debug

      # 6. Renombrar APK con número de build para identificar la versión
      - name: Renombrar APK
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/campus-guia-debug-v${VERSION}-build${{ github.run_number }}.apk

      # 7. Subir APK como artefacto del workflow (disponible 14 días)
      #    Para descargarlo: GitHub → Actions → este workflow → pestaña Artifacts
      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: campus-guia-apk-build${{ github.run_number }}
          path: build/app/outputs/flutter-apk/campus-guia-debug-*.apk
          retention-days: 14

      # 8. (Opcional) Crear GitHub Release si se proveyó un tag manual
      - name: Crear GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "CampusGuía ${{ github.event.inputs.release_tag }}"
          body: |
            ## APK para pruebas QA

            ### Cómo instalar en Android:
            1. Descarga el archivo `.apk` de esta release
            2. En tu Android: **Ajustes → Seguridad → Instalar aplicaciones desconocidas** → activa para tu navegador/administrador de archivos
            3. Abre el archivo descargado y toca **Instalar**
            4. Abre **CampusGuía EAFIT** y reporta cualquier problema por WhatsApp

            ### Qué probar:
            - Que la app abre correctamente
            - Que los permisos de GPS y micrófono se solicitan
            - Que TalkBack lee los elementos de la pantalla
            - Que la lista de categorías y lugares se muestra
          files: build/app/outputs/flutter-apk/campus-guia-debug-*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
